<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LupFede calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
</head>

<body>
    <div class="container">
        <input type="text" id="display" disabled>
        <div class="buttons-container">
            <div class="row">
                <button class="calc_button" id="7">7</button>
                <button class="calc_button" id="8">8</button>
                <button class="calc_button" id="9">9</button>
                <button class="calc_button" id="/">/</button>
            </div>
            <div class="row">
                <button class="calc_button" id="4">4</button>
                <button class="calc_button" id="5">5</button>
                <button class="calc_button" id="6">6</button>
                <button class="calc_button" id="*">*</button>
            </div>
            <div class="row">
                <button class="calc_button" id="1">1</button>
                <button class="calc_button" id="2">2</button>
                <button class="calc_button" id="3">3</button>
                <button class="calc_button" id="-">-</button>
            </div>
            <div class="row">
                <button class="calc_button" id="0">0</button>
                <button class="calc_button" id="C">C</button>
                <button class="calc_button" id="=">=</button>
                <button class="calc_button" id="+">+</button>
            </div>
        </div>
    </div>
    <script src="./calculadora.js"></script>
</body>

</html>
